# =============================================================================
# nginx_autoparts.conf — Add these blocks to your existing Nginx configuration
# =============================================================================

# ── Add this in the http { } block (nginx.conf or conf.d/main.conf) ──────────
# Rate limit: 60 requests/minute per IP
limit_req_zone $binary_remote_addr zone=autoparts_api:10m rate=60r/m;


# ── Add this inside your existing server { } block (the HTTPS one) ───────────
#    Right after the existing Odoo location blocks

    # Auto Parts Search API
    location /api/autoparts/ {
        # Strip the /api/autoparts prefix before proxying
        rewrite ^/api/autoparts/(.*)$ /$1 break;

        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Rate limiting (burst allows short spikes from Odoo)
        limit_req zone=autoparts_api burst=30 nodelay;

        # CORS headers for browser-side access (optional)
        add_header Access-Control-Allow-Origin  "https://your-odoo-domain.com" always;
        add_header Access-Control-Allow-Headers "X-API-Key, Content-Type" always;
    }

    # FastAPI OpenAPI docs (disable in production if not needed)
    location /api/autoparts/docs {
        rewrite ^/api/autoparts/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        # Restrict docs to internal network only
        allow 127.0.0.1;
        deny  all;
    }
